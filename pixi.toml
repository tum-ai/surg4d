[workspace]
channels = ["conda-forge"]
name = "surgery-scene-graphs"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
install-simple-knn = "python -m pip install --no-build-isolation -e submodules/simple-knn/ && echo 'from ._C import distCUDA2\n\n__all__ = [\"distCUDA2\"]' > submodules/simple-knn/simple_knn/__init__.py"
install-rasterization = "python -m pip install --no-build-isolation -e submodules/4d-langsplat-rasterization/"
install-deva = "python -m pip install -e submodules/4d-langsplat-tracking-anything-with-deva/"
install-segment-anything = "python -m pip install git+https://github.com/facebookresearch/segment-anything.git"
install-depth-anything-3 = "python -m pip install submodules/depth-anything-3/"
install-cotracker = "python -m pip install git+https://github.com/facebookresearch/co-tracker.git"
download-cotracker-checkpoint = "mkdir -p checkpoints && wget -O checkpoints/cotracker3_scaled_offline.pth https://huggingface.co/facebook/cotracker3/resolve/main/scaled_offline.pth || curl -L -o checkpoints/cotracker3_scaled_offline.pth https://huggingface.co/facebook/cotracker3/resolve/main/scaled_offline.pth"
setup = { depends-on = ["install-simple-knn", "install-rasterization", "install-deva", "install-segment-anything", "install-depth-anything-3", "install-cotracker", "download-cotracker-checkpoint"] }
# run pixi run setup after pixi install to install cuda extensions

[activation.env]
# some cuda extensions need to link against pytorch
LD_LIBRARY_PATH = "$PIXI_PROJECT_ROOT/.pixi/envs/default/lib/python3.10/site-packages/torch/lib:$LD_LIBRARY_PATH"
# LIBRARY_PATH needed for Triton to find libcuda.so at compile time
LIBRARY_PATH = "$PIXI_PROJECT_ROOT/.pixi/envs/default/lib/stubs:$PIXI_PROJECT_ROOT/.pixi/envs/default/lib:$LIBRARY_PATH"
# C_INCLUDE_PATH needed for Triton JIT to find crypt.h and other headers
C_INCLUDE_PATH = "$PIXI_PROJECT_ROOT/.pixi/envs/default/include:$C_INCLUDE_PATH"
CPATH = "$PIXI_PROJECT_ROOT/.pixi/envs/default/include:$CPATH"
# ignore ~/.local packages in case someone accidentally installed stuff with system python
PYTHONNOUSERSITE = "1"
# CUDA_DEVICE_ORDER ensures GPU numbering matches nvidia-smi
CUDA_DEVICE_ORDER = "PCI_BUS_ID"
TOKENIZERS_PARALLELISM="false"

[dependencies]
python = "==3.10"
cuda-toolkit = "12.4.*"
cuda-version = "==12.4"
cuda-driver-dev = "12.4.*"  # provides libcuda stub for Triton JIT compilation
libxcrypt = "*"
colmap = ">=3.9.1,<4"

[pypi-dependencies]
pip = "*"
torch = "==2.6.0"
torchaudio = "==2.6.0"
torchvision = "==0.21.0"
transformers = ">=4.57.0, <5"
accelerate = ">=1.10.1, <2"
bitsandbytes = ">=0.44.0, <1"
sentence-transformers = ">=5.1.1, <6"
open-clip-torch = ">=3.2.0, <4"
mmcv = "==1.6.0"
opencv-python = ">=4.12.0.88, <5"
imageio = { version = ">=2.37.0, <3", extras = ["ffmpeg"] }
open3d = ">=0.18.0, <0.19"
plyfile = ">=1.1.2, <2"
qwen-vl-utils = { version = ">=0.0.14, <0.0.15", extras = ["decord"] }
matplotlib = ">=3.10.7, <4"
seaborn = ">=0.13.2, <0.14"
mediapy = ">=1.2.4, <2"
numpy = ">=2.2.6, <3"
scipy = ">=1.15.3, <2"
