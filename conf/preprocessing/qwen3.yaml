semantic_mask_subdir: semantic_masks
instance_mask_subdir: instance_masks
depth_subdir: depth
depth_processed_subdir: depth_processed  # depth at DA3 processed resolution (for point cloud consistency)
confidence_subdir: confidence
cotracker_subdir: cotracker_semantics

# spatial label preprocessing
annotation_root: data/annotations
annotation_stride: 4
spatial_labels_output_filename: "spatial_annotations.json"
dump_label_visualizations: true
label_viz_subdir: label_viz

frames_divisor: 32 # after removing black borders, center crop to multiple of this for qwen to work

# depth anything v3 settings
# Point cloud is now initialized from first, middle, and last frames (hardcoded in preprocess.py)
da3_visualize: true
da3_conf_thresh_percentile: 0.0
da3_pc_pixel_stride: 3 # stride for subsampling point cloud pixels (e.g., 3 = every 3rd pixel = 1/9 points)
# TODO: fix bug: setting this != 1 messes with the graph extraction
da3_densify_ratio: 1 # densification ratio: multiply points by this factor (copies with noise)
da3_edge_gradient_threshold: 0.1 # absolute gradient threshold in meters per pixel for filtering edge floaters. Set to null to disable.

verbose_output: false # keep intermediate output files
pc_ply_visualization_filename: pointcloud_viz.ply # set to None to disable

# instance mask conversion
min_component_area: 5 # minimum area of a component to be considered an instance

# CoTracker3 settings
cotracker_n_points_per_frame: 4096 # number of random control points per query frame
cotracker_depth_jump_threshold: 0.1 # absolute depth change threshold in meters for killing points that jump between surfaces. Set to null to disable.

# Instance merging settings (across views)
instance_merge_containment_threshold: 0.1 # minimum containment ratio to merge instances across views
instance_merge_containment_radius: 2.5 # multiplier for avg neighbor distance to determine containment

only_update_annotations: true # write nothing but translated spatial annotations