semantic_mask_subdir: ${preprocess.semantic_mask_subdir}
instance_mask_subdir: ${preprocess.instance_mask_subdir}
geometry_npz_relpath: ${extract_geometry.da3_subdir}/results.npz
da3_densify_ratio: ${extract_geometry.da3_densify_ratio}
da3_pc_pixel_stride: ${extract_geometry.da3_pc_pixel_stride}
da3_conf_thresh_percentile: ${extract_geometry.da3_conf_thresh_percentile}

cotracker_subdir: cotracker_final
cotracker_n_points_per_frame: 2500 #2048 #4096
cotracker_depth_jump_threshold: 0.1
cotracker_k_neighbors: 3
cotracker_idw_power: 2.0

# ablations - settings here are top performing method
cotracker_filter_depth_jumps: true
cotracker_init_from_multiple_frames: false
cotracker_fill_occlusions: true

instance_merge_containment_threshold: 0.2
instance_merge_containment_radius: 2.5
