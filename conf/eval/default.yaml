defaults:
  # - triplets: default
  - temporal: default
  - spatial: default
  - _self_

triplets: null

# qwen
qwen3_size: ${feature_extraction.qwen3_size}
qwen3_use_fp8: ${feature_extraction.qwen3_use_fp8}
qwen_version: qwen3  # Version identifier: "qwen25" or "qwen3"

# Video metadata for all evaluations
video_fps: 25  # Original video framerate (Cholec80 is 25 fps)

# Quantization settings for the evaluation model (used across all eval stages)
use_bnb_4bit: false
use_bnb_8bit: false

# Required output directory for benchmark results
output_dir: ${output_root}/predictions

# Optional output override for benchmark results
output: null

# Path configuration for evaluations
# These define the directory structure for preprocessed data and outputs
paths:
  # Subdirectory within preprocessed clip dir that contains images
  images_subdir: "images"
  
  # Subdirectory within output clip dir that contains graph data
  graph_subdir: ${graph_extraction.graph_output_subdir}
  
  # Can override these per evaluation type if needed
  # e.g., different graph subdirs for different ablations