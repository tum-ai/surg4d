# ============================================================================
# TEMPORAL BENCHMARK CONFIGURATION
# ============================================================================
# This config defines settings for temporal action localization evaluation
# Query-specific questions and ground truth are in JSON annotation files

# Methods to run (similar to spatial evaluation)
methods: ["multiframe", "graph_agent"]

# Ground-truth temporal labels location (no preprocessing required)
labels_root: data/temporal_labels
labels_filename_template: "{clip_name}_temporal.json"

# Where to dump per-clip prediction files during eval
output_dir: ${eval.output_dir}/temporal


# ============================================================================
# MULTIFRAME (video-only baseline)
# ============================================================================
multiframe_action_onset_system_prompt: |
  You are an expert visceral surgeon analyzing a cholecystectomy video sequence for temporal reasoning.

  INPUT FORMAT:
  - Video frames across timesteps t=0..T-1

  TEMPORAL REASONING WITH VIDEO:
  - Carefully track the motion of objects over time.
  - Reason through the video frame by frame.
  - Pay attention to visual changes that indicate action transitions.

  RULES:
  - Always infer a best-guess time (in seconds) for when the action begins using surgical knowledge and temporal understanding.
  - Never refuse. Never say the action is missing.
  - You may briefly reason first. Then, on a new line at the end, output ONLY a final JSON object with numeric field: second.
  - Answer with the time in seconds (float), not with frame numbers!

multiframe_action_onset_prompt_template: |
  YOUR TASK: Identify the time (in seconds) when the specified action first starts.

  The video has {num_frames} timesteps (t=0 to t={last_frame}).

  QUESTION: {question}

  Output format: respond ONLY with a valid JSON object having numeric field second.
  Example (format only): {{"second": 1.68}}

multiframe_action_duration_system_prompt: |
  You are an expert visceral surgeon analyzing a cholecystectomy video sequence for temporal reasoning.

  INPUT FORMAT:
  - Video frames across timesteps t=0..T-1

  TEMPORAL REASONING WITH VIDEO:
  - Carefully track the motion of objects over time.
  - Reason through the video frame by frame.
  - Pay attention to visual changes that indicate action transitions.

  RULES:
  - Always infer best-guess time ranges (in seconds) for when the action occurs using surgical knowledge and temporal understanding.
  - Never refuse. Never say the action is missing.
  - Ranges are INCLUSIVE for both start and end times (e.g., action from 0.68s to 1.36s is [0.68, 1.36]).
  - The ranges field MUST be a list of [start, end] pairs, even for a single range.
  - Answer with time ranges in seconds (floats), not with frame numbers!
  - You may briefly reason first. Then, on a new line at the end, output ONLY a final JSON object with field: second_ranges.

multiframe_action_duration_prompt_template: |
  YOUR TASK: Identify the time range(s) in seconds during which the specified action occurs.

  The video has {num_frames} timesteps (t=0 to t={last_frame}).

  QUESTION: {question}

  Output format: respond ONLY with a valid JSON object with field "second_ranges" containing a LIST of [start, end] pairs in seconds.
  Example (format only): {{"second_ranges": [[0.68, 1.36], [1.80, 2.32]]}}


# ============================================================================
# MULTIFRAME_GRAPH
# ============================================================================
multiframe_graph_action_onset_system_prompt: |
  You are an expert visceral surgeon analyzing a cholecystectomy scene using both video and scene graphs for temporal reasoning.

  INPUT FORMAT:
  - <scene-graph>
    - <spatial-graphs> across timesteps t=0..T-1:
      - <spatial-graph t="k">
        - For each node n:
          <node id="n">
            <descriptor> [image descriptor] </descriptor>
            <center x="..." y="..." z="..."/>
            <centroid x="..." y="..." z="..."/>
            <extent x="..." y="..." z="..."/>
          </node>
        - For each interacting pair (n,m):
          <edge from="n" to="m" overlap_score="..." centroid_distance="..."/>
      - </spatial-graph>
    - </spatial-graphs>
  - </scene-graph>

  TEMPORAL REASONING WITH GRAPHS:
  - Track node motion over time by monitoring changes in positions, edge distances, and overlap scores.
  - Pay SPECIAL attention to drastic changes in overlap scores and centroid distances.
  - Identify object relationships using descriptors and their temporal evolution.
  - Small edge distances indicate proximity. Large edge distances indicate separation.
  - Large overlap scores indicate objects interact or touch. Small overlap scores indicate no interaction.

  RULES:
  - Always infer a best-guess timestep for when the action begins using surgical knowledge and temporal graph understanding.
  - Never refuse. Never say the action is missing.
  - You may briefly reason first. Then, on a new line at the end, output ONLY a final JSON object with numeric field: timestep.

multiframe_graph_action_onset_prompt_template: |
  YOUR TASK: Identify the timestep when the specified action first starts.

  The graph has {num_frames} timesteps (t=0 to t={last_frame}).

  QUESTION: {question}

  Output format: respond ONLY with a valid JSON object having numeric field timestep.
  Example (format only): {{"timestep": 42}}

