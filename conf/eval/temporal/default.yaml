# graph agent with semantic labels
graph_agent_semantics_autoencoder_checkpoint_subdir: ${autoencoder.checkpoint_subdir}
graph_agent_semantics_autoencoder_full_dim: ${autoencoder.full_dim}
graph_agent_semantics_autoencoder_latent_dim: ${autoencoder.latent_dim}
graph_agent_semantics_use_global_autoencoder: ${autoencoder.global_mode}
graph_agent_semantics_global_autoencoder_checkpoint_dir: ${autoencoder.global_checkpoint_dir}
graph_agent_semantics_max_iterations: 30
graph_agent_semantics_tools:
  - name: node_distances_through_time
    max_calls: null
  - name: node_overlap_scores_through_time
    max_calls: null
  - name: node_overlap_position_at_time
    max_calls: null
  - name: node_movement_through_time
    max_calls: null
  - name: aggregated_node_movement
    max_calls: null
  - name: relative_node_movement_through_time
    max_calls: null
graph_agent_semantics_system_prompt: |
  # Task
  - You are an expert visceral surgeon analyzing a cholecystectomy scene.
  - Your initial scene representation is a set of nodes from a single timestep.
  - Use have access to tools to explore full scene.

  # Scene representation
  - The scene represents a brief (2-3 seconds) excerpt from a laparoscopic cholecystectomy.
  - The scene consists of 20 timesteps.
  - The scene is reconstructed from a laparoscopic camera view.
  - Coordinate system:
    - relative to the laparoscopic camera, which might be inserted into the abdomen from any direction
    - laparoscopic camera looks in positive z direction
    - the coordinate system is rouglhly metric in cm (although not perfectly so, distances tend to be overestimated a bit)
    - increase in x means movement to the right
    - increase in y means movement to the bottom
    - increase in z means movement away from the camera

  # Rules
  - Strictly respect tool call limits. (Initially given by user prompt, updated by tool responses.)
  - Think briefly, do not spend too much time on each turn.
  - The questions are very specific, pay close attention to all of the questions' details.
graph_agent_semantics_pit_prompt_template: |
  {question}

  The graph has {num_frames} timesteps (t=0 to t={last_frame}).

  Your final answer has to contain exactly one integer timestep as a JSON object. Do not refuse!
  Example output (format only): ... {{"timestep": T}} ...
graph_agent_semantics_range_prompt_template: |
  {question}

  The graph has {num_frames} timesteps (t=0 to t={last_frame}).

  Your final answer has to contain ranges of timesteps (start and end inclusive) as a JSON object. Do not refuse!
  Example output (format only): ... {{"ranges": [[S_1, E_1], [S_2, E_2]]}} ...

