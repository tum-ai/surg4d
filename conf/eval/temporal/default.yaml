methods:
  # - multiframe
  # - multiframe_masks
  - graph_agent_semantics
  - graph_agent_semantics_vision
output_dir: ${eval.output_dir}/temporal
tool_viz_dir: ${eval.output_dir}/tool_viz/temporal # null to disable

# multiframe
multiframe_system_prompt: ${eval.generic_system_prompts.multiframe}
multiframe_pit_prompt_template: |
  {question}

  Your final answer has to contain exactly one float second as a JSON object. Do not refuse!
  Example output (format only): ... {{"second": T}} ...

multiframe_action_duration_prompt_template: |
  {question}

  Your final answer has to contain a list of time ranges in seconds as a JSON object. Do not refuse!
  Example output (format only): ... {{"second_ranges": [[T_1, T_2], [T_3, T_4]]}} ...

# multiframe with semantic mask overlays
multiframe_masks_system_prompt: ${eval.generic_system_prompts.multiframe_masks}
multiframe_masks_pit_prompt_template: |
  {question}

  Your final answer has to contain exactly one float second as a JSON object. Do not refuse!
  Example output (format only): ... {{"second": T}} ...

multiframe_masks_action_duration_prompt_template: |
  {question}

  Your final answer has to contain a list of time ranges in seconds as a JSON object. Do not refuse!
  Example output (format only): ... {{"second_ranges": [[T_1, T_2], [T_3, T_4]]}} ...

# graph agent with semantic labels and frame fetching tool
graph_agent_semantics_vision_max_iterations: 30
graph_agent_semantics_vision_tools:
  - name: node_distances_through_time
    max_calls: null
  - name: node_overlap_scores_through_time
    max_calls: null
  - name: node_overlap_position_at_time
    max_calls: null
  - name: node_movement_through_time
    max_calls: null
  - name: aggregated_node_movement
    max_calls: null
  - name: relative_node_movement_through_time
    max_calls: null
  - name: show_scene_at_timestep
    max_calls: null
graph_agent_semantics_vision_system_prompt: ${eval.generic_system_prompts.graph_agent_semantics_vision}
graph_agent_semantics_vision_pit_prompt_template: |
  {question}

  The graph has {num_frames} timesteps (t=0 to t={last_frame}).

  Your final answer has to contain exactly one integer timestep as a JSON object. Do not refuse!
  Example output (format only): ... {{"timestep": T}} ...
graph_agent_semantics_vision_range_prompt_template: |
  {question}

  The graph has {num_frames} timesteps (t=0 to t={last_frame}).

  Your final answer has to contain ranges of timesteps (start and end inclusive) as a JSON object. Do not refuse!
  Example output (format only): ... {{"ranges": [[S_1, E_1], [S_2, E_2]]}} ...

# graph agent with semantic labels
graph_agent_semantics_max_iterations: 30
graph_agent_semantics_tools:
  - name: node_distances_through_time
    max_calls: null
  - name: node_overlap_scores_through_time
    max_calls: null
  - name: node_overlap_position_at_time
    max_calls: null
  - name: node_movement_through_time
    max_calls: null
  - name: aggregated_node_movement
    max_calls: null
  - name: relative_node_movement_through_time
    max_calls: null
graph_agent_semantics_system_prompt: ${eval.generic_system_prompts.graph_agent_semantics}
graph_agent_semantics_pit_prompt_template: |
  {question}

  The graph has {num_frames} timesteps (t=0 to t={last_frame}).

  Your final answer has to contain exactly one integer timestep as a JSON object. Do not refuse!
  Example output (format only): ... {{"timestep": T}} ...
graph_agent_semantics_range_prompt_template: |
  {question}

  The graph has {num_frames} timesteps (t=0 to t={last_frame}).

  Your final answer has to contain ranges of timesteps (start and end inclusive) as a JSON object. Do not refuse!
  Example output (format only): ... {{"ranges": [[S_1, E_1], [S_2, E_2]]}} ...