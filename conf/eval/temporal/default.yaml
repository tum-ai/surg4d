    YOUR TASK: Identify the frame when the specified action first starts, leveraging temporal changes in descriptor evidence.

    The descriptor sequence has {num_frames} timesteps, numbered 0..{last_frame}.

    QUESTION: {question}

    ANSWER FORMAT: {answer_format}

    You may briefly reason first. Then, on a new line at the end, output ONLY a final JSON object: {{"frame": <int>}}

  action_duration: |
    You are an expert visceral surgeon analyzing descriptor images over time.

    YOUR TASK: Identify the frame range(s) during which the specified action occurs, leveraging temporal changes in descriptor evidence.

    The descriptor sequence has {num_frames} timesteps, numbered 0..{last_frame}.

    QUESTION: {question}

    ANSWER FORMAT: {answer_format}

    You may briefly reason first. Then, on a new line at the end, output ONLY a final JSON object: {{"ranges": [[<int>, <int>], ...]}}
