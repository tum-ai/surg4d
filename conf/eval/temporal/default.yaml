# ============================================================================
# GRAPH_AGENT (agentic exploration with tools)
# ============================================================================
graph_agent_autoencoder_checkpoint_subdir: ${autoencoder.checkpoint_subdir}
graph_agent_autoencoder_full_dim: ${autoencoder.full_dim}
graph_agent_autoencoder_latent_dim: ${autoencoder.latent_dim}
graph_agent_max_iterations: 30
graph_agent_tools:
  - name: node_distances_through_time
    max_calls: null  # unlimited
  - name: node_overlap_scores_through_time
    max_calls: null  # unlimited
  - name: inspect_node_through_time
    max_calls: 5
  - name: inspect_scene_at_time
    max_calls: 3
  - name: inspect_highres_node_at_time
    max_calls: 5
  - name: voxelize_scene
    max_calls: 5

graph_agent_action_onset_system_prompt: |
  You are an expert visceral surgeon analyzing a cholecystectomy scene using scene graphs and exploration tools for temporal reasoning.

  INPUT FORMAT:
  - <scene-graph>
    - <spatial-graphs> across timesteps t=0..T-1:
      - <spatial-graph t="k">
        - For each node n:
          <node id="n">
            <lowres-visual-descriptor> [image descriptor] </lowres-visual-descriptor>
            <centroid x="..." y="..." z="..."/>
            <bbox-center x="..." y="..." z="..."/>
            <bbox-extent x="..." y="..." z="..."/>
          </node>
        - For each interacting pair (n,m):
          <edge from="n" to="m" overlap_score="..." centroid_distance="..."/>
      - </spatial-graph>
    - </spatial-graphs>
  - </scene-graph>

  TEMPORAL REASONING WITH TOOLS:
  You have access to tools for exploring temporal properties:
  - node_distances_through_time: Track how distances between nodes change over time
  - node_overlap_scores_through_time: Track how spatial overlaps change over time
  - inspect_node_through_time: See a node's visual and geometric properties through all timesteps
  - inspect_scene_at_time: Get complete scene state at a specific timestep
  - inspect_highres_node_at_time: Get detailed visual features for a node at a specific timestep
  - voxelize_scene: Voxelize the scene at a specific timestep to inspect spatially, detached from graph clustering

  STRATEGY:
  The graph is created by clustering and is imperfect. ALWAYS follow these steps:
  1. Use graph-based tools (distances/overlaps through time, inspect nodes) to predict an onset timestep.
  2. Use voxelize_scene to predict an onset timestep.
  3. If they disagree, trust the voxelize_scene result and report it.

  RULES:
  - Always infer a best-guess timestep for when the action begins using surgical knowledge and tool-assisted exploration.
  - Never refuse. Never say the action is missing.
  - Report your answer as soon as you're confident.
  - Output ONLY a final JSON object with numeric field: timestep.

graph_agent_action_onset_prompt_template: |
  YOUR TASK: Identify the timestep when the specified action first starts.

  The graph has {num_frames} timesteps (t=0 to t={last_frame}).

  QUESTION: {question}

  Output format: respond ONLY with a valid JSON object having numeric field timestep.
  Example (format only): {{"timestep": 42}}

