methods:
  # - frame_direct
  # - frame_direct_masks
  - graph_agent_semantics
  - graph_agent_semantics_vision
geometry_npz_relpath: ${extract_geometry.da3_subdir}/results.npz
gt_filename: ${preprocess.spatial_labels_output_filename}
output_dir: ${eval.output_dir}/spatial
dump_visualizations: true
visualizations_dir: ${eval.output_dir}/spatial_viz
tool_viz_dir: ${eval.output_dir}/tool_viz/spatial

# frame direct
frame_direct_system_prompt: ${eval.generic_system_prompts.frame_direct}
frame_direct_prompt_template: |
  {question}

  Your final answer has to contain exactly one 2D point in the image's pixel coordinate system as a JSON object. Do not refuse!
  Example output (format only): ... {{"x": X, "y": Y}} ...

# frame direct with semantic mask overlays
frame_direct_masks_system_prompt: ${eval.generic_system_prompts.frame_direct_masks}
frame_direct_masks_prompt_template: |
  {question}

  Your final answer has to contain exactly one 2D point in the image's pixel coordinate system as a JSON object. Do not refuse!
  Example output (format only): ... {{"x": X, "y": Y}} ...

# graph agent with semantic labels
graph_agent_semantics_vision_max_iterations: 20
graph_agent_semantics_vision_tools:
  - name: node_distances_through_time
    max_calls: null
  - name: node_overlap_scores_through_time
    max_calls: null
  - name: node_overlap_position_at_time
    max_calls: null
  - name: node_movement_through_time
    max_calls: null
  - name: aggregated_node_movement
    max_calls: null
  - name: relative_node_movement_through_time
    max_calls: null
  - name: show_scene_at_timestep
    max_calls: null
graph_agent_semantics_vision_system_prompt: ${eval.generic_system_prompts.graph_agent_semantics_vision}
graph_agent_semantics_vision_prompt_template: |
  {question}

  Your final answer has to contain exactly one 3D point in the scene's coordinate system as a JSON object. Do not refuse!
  Example output (format only): ... {{"x": X, "y": Y, "z": Z}} ...

# graph agent with semantic labels
graph_agent_semantics_max_iterations: 20
graph_agent_semantics_tools:
  - name: node_distances_through_time
    max_calls: null
  - name: node_overlap_scores_through_time
    max_calls: null
  - name: node_overlap_position_at_time
    max_calls: null
  - name: node_movement_through_time
    max_calls: null
  - name: aggregated_node_movement
    max_calls: null
  - name: relative_node_movement_through_time
    max_calls: null
graph_agent_semantics_system_prompt: ${eval.generic_system_prompts.graph_agent_semantics}
graph_agent_semantics_prompt_template: |
  {question}

  Your final answer has to contain exactly one 3D point in the scene's coordinate system as a JSON object. Do not refuse!
  Example output (format only): ... {{"x": X, "y": Y, "z": Z}} ...