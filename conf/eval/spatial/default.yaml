graph_subdir: ${graph_extraction.graph_output_subdir}

# Layers to extract text->vision attentions from (indices into transformer blocks)
layers: [14, 16, 18, 20, 22]

# Prompt and substring to focus attention on
prompt: "Locate the grasper in the scene."
substring: "grasper"

# Timestep index into precomputed features (0-based)
timestep: 0

# Optional matplotlib colormap for heatmaps
colormap: "jet"