# splat_grid
splat_grid_autoencoder_checkpoint_subdir: ${autoencoder.checkpoint_subdir}
splat_grid_autoencoder_full_dim: ${autoencoder.full_dim}
splat_grid_autoencoder_latent_dim: ${autoencoder.latent_dim}
