  CRITICAL: Each triplet MUST have a different confidence value based on visibility + segmentation clarity.
  
  Wrap JSON in ```json fenced block.

# ============================================================================
# MULTIFRAME (video baseline)
# ============================================================================
multiframe_system_prompt: |
  # Task
  You are an expert visceral surgeon analyzing a cholecystectomy video for surgical action triplets.
  
  # Rules
  - The video is provided at a specific framerate
  - You will be asked to identify triplets at a specific time (in seconds)
  - Use temporal context to disambiguate actions
  - Evaluate ONLY the specified time point, other frames are context
  - Reason briefly, then output final JSON

multiframe_prompt_template: |
  Identify all active surgical triplets (instrument-verb-target) at time t={target_second}s.
  
  Valid categories:
  - instruments: grasper, bipolar, hook, scissors, clipper, irrigator
  - verbs: grasp, retract, dissect, coagulate, clip, cut, aspirate, irrigate, pack, null_verb
  - targets: gallbladder, cystic_plate, cystic_duct, cystic_artery, cystic_pedicle, blood_vessel, fluid, abdominal_wall_cavity, liver, adhesion, omentum, peritoneum, gut, specimen_bag, null_target
  
  Output format: {{"triplets": [{{"instrument": "<str>", "verb": "<str>", "target": "<str>", "confidence": <float>}}, ...]}}
  
  CRITICAL: Each triplet MUST have a different confidence value. Use temporal continuity to assess confidence.
  
  Evaluate ONLY at t={target_second}s. Other frames provide context only.
  
  Wrap JSON in ```json fenced block.

