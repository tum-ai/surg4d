FRAMERATE: 25
NUM_FRAMES: 80
TEMP_CONTEXT_FR_MULTIPLIER: 1

# Where to dump per-clip prediction files during eval
output_dir: ${eval.output_dir}/triplets
mask_overlay_viz_output_dir: ${eval.output_dir}/triplets_mask_overlays

# Evaluate on frames aligned to graph timesteps (80 frames -> 20 steps)
# Stride 4 means we evaluate at frames: 0,4,8,... within each clip
frame_stride: 4
align_to_graph: true
dump_viz: true
viz_output_dir: ${eval.output_dir}/triplets_viz
viz_max_samples: 100

ablations: ["single_frame", "single_frame_mask_overlay", "multiframe", "multiframe_mask_overlay", "static_graph", "dynamic_graph", "static_descriptors", "dynamic_descriptors"]
multiframe_video_mode: true

system_prompts:
  single_frame: |
    You are an expert visceral surgeon analyzing a cholecystectomy image.
    Evaluate only the current image. Ensure instrument/verb/target combinations are coherent.
  single_frame_mask_overlay: |
    You are an expert visceral surgeon analyzing a cholecystectomy image.
    Evaluate only the current image. Ensure instrument/verb/target combinations are coherent.
  multiframe: |
    You are an expert visceral surgeon analyzing a cholecystectomy video sequence.
    Always evaluate only the specified timestep t; other frames are context only. Ensure instrument/verb/target combinations are coherent at t.
  static_descriptors: |
    You are an expert visceral surgeon analyzing a surgical scene with descriptors.
    Ensure instrument/verb/target combinations are coherent.

    INPUT FORMAT:
    - <descriptor>
      - For each descriptor d:
          <descriptor id="d">
            [image descriptor]
          </descriptor>
    - </descriptor>

    TASK: Determine which instrument-verb-target triplets are active using descriptors.
    - Use object descriptors to identify instruments vs anatomy
    - Output strictly the JSON specified in the user prompt; use STRING LABELS only
    - You may briefly reason first. Then, on a new line at the end, output ONLY the final JSON object
  static_graph: |
    You are an expert visceral surgeon analyzing a surgical scene graph snapshot.
    Ensure instrument/verb/target combinations are coherent.

    INPUT FORMAT:
    - <scene-graph>
      - <spatial-graph>
        - For each node n:
          <node id="n">
            <descriptor> [image descriptor] </descriptor>
            <centroid x="..." y="..." z="..."/>
            <extent x="..." y="..." z="..."/>
          </node>
          - For each interacting pair (n,m):
            <edge from="n" to="m" overlap_score="..." centroid_distance="..."/>
      - </spatial-graph>
    - </scene-graph>

    TASK: Determine which instrument-verb-target triplets are active using nodes/edges.
    - Use object descriptors to identify instruments vs anatomy
    - Use edges/overlap and centroid distances to infer interactions
    - Output strictly the JSON specified in the user prompt; use STRING LABELS only
    - You may briefly reason first. Then, on a new line at the end, output ONLY the final JSON object
  dynamic_descriptors: |
    You are an expert visceral surgeon analyzing surgical scene with descriptors over time.
    Evaluate only the specified timestep t; ensure instrument/verb/target combinations are coherent at t.

    INPUT FORMAT:
    - <descriptors>
      - For each descriptor d:
        - <descriptor id="d">
          [image descriptor]
        </descriptor>
      - </descriptor>
    - </descriptors>

    TASK: Determine which instrument-verb-target triplets are active using descriptors. Answer ONLY for the specified timestep t, other timesteps are context only.
    - Identify instruments vs anatomy from descriptors
    - Output strictly the JSON specified in the user prompt; use STRING LABELS only
    - You may briefly reason first. Then, on a new line at the end, output ONLY the final JSON object
  dynamic_graph: |
    You are an expert visceral surgeon analyzing surgical scene graphs over time.
    Evaluate only the specified timestep t; ensure instrument/verb/target combinations are coherent at t.

    INPUT FORMAT:
    - <scene-graph>
      - <spatial-graphs> across timesteps t=0..T-1:
        - <spatial-graph t="k">
          - For each node n:
            <node id="n">
              <descriptor> [image descriptor] </descriptor>
              <center x="..." y="..." z="..."/>
              <centroid x="..." y="..." z="..."/>
              <extent x="..." y="..." z="..."/>
            </node>
          - For each interacting pair (n,m):
            <edge from="n" to="m" overlap_score="..." centroid_distance="..."/>
        - </spatial-graph>
      - </spatial-graphs>
    - </scene-graph>

    TASK: Determine which instrument-verb-target triplets are active using nodes/edges. Answer ONLY for the specified timestep t, other timesteps are context only.
    - Identify instruments vs anatomy from descriptors
    - Use nodes/edges/overlap and centroid distances to infer interactions/actions
    - Output strictly the JSON specified in the user prompt; use STRING LABELS only
    - You may briefly reason first. Then, on a new line at the end, output ONLY the final JSON object

prompts:
  single_frame: |
    YOUR TASK: Identify instrument-verb-target triplets that are CURRENTLY ACTIVE and CLEARLY VISIBLE in this image.
    
    ⚠️ MANDATORY CONFIDENCE VARIANCE REQUIREMENT ⚠️
    READ THIS FIRST - YOUR RESPONSE WILL BE REJECTED IF YOU VIOLATE THESE RULES:
    
    STEP 1: Assess EACH triplet's visibility/certainty level INDEPENDENTLY
    STEP 2: Assign confidence from the appropriate tier based on that specific triplet's evidence quality
    STEP 3: VERIFY that your confidence values span multiple tiers (unless only 1 triplet)
    
    ❌ UNACCEPTABLE (will be rejected):
    - Using 0.92 for all triplets: [0.92, 0.92, 0.92]
    - Using only 1-2 values: [0.92, 0.73, 0.92, 0.73]
    - Staying in one tier: [0.90, 0.91, 0.92, 0.93]
    
    ✅ ACCEPTABLE:
    - Diverse values across tiers: [0.94, 0.76, 0.52]
    - Using full range: [0.93, 0.67, 0.44, 0.21]
    - Values vary by visibility: [0.91, 0.78, 0.59]
    
    CONFIDENCE TIER SYSTEM (assess each triplet independently):
    Tier 1 (0.90-0.95): ALL components clearly visible AND action definitively happening AND no ambiguity
    Tier 2 (0.70-0.80): Instrument/target clear BUT action partially obscured OR minor ambiguity about verb
    Tier 3 (0.50-0.65): Instrument clear BUT target partially obscured OR action inferred from position
    Tier 4 (0.30-0.45): Multiple interpretations possible OR significant occlusion but context suggests this
    Tier 5 (0.10-0.25): Speculative interpretation OR minimal evidence BUT anatomically plausible
    
    CRITICAL RULES:
    - ONLY report triplets where both the instrument and the action are visible
    - Do NOT infer from procedure context; return {"triplets": []} if unsure
    - REASON ABOUT COMBINATIONS: Verify that each instrument/verb/target combination is surgically plausible
    - IMPORTANT: Values for "instrument", "verb", and "target" MUST be STRING LABELS from VALID CATEGORIES below. Never output numeric IDs
    
    VALID CATEGORIES:
    - instrument: ["grasper", "bipolar", "hook", "scissors", "clipper", "irrigator"]
    - verb: ["grasp", "retract", "dissect", "coagulate", "clip", "cut", "aspirate", "irrigate", "pack", "null_verb"]
    - target: ["gallbladder", "cystic_plate", "cystic_duct", "cystic_artery", "cystic_pedicle", "blood_vessel", "fluid", "abdominal_wall_cavity", "liver", "adhesion", "omentum", "peritoneum", "gut", "specimen_bag", "null_target"]
    ANSWER FORMAT: {"triplets": [{"instrument": "<string>", "verb": "<string>", "target": "<string>", "confidence": <float>}, ...]}

    OUTPUT CONSTRAINTS:
    You may briefly reason first. Then, on a new line at the end, output ONLY the final JSON object.
    - JSON OBJECT ONLY with this schema: {"triplets": [{"instrument": "<string>", "verb": "<string>", "target": "<string>", "confidence": <float 0.0-1.0>}, ...]}
    - Keys MUST be exactly: instrument, verb, target, confidence. Values for I/V/T MUST be lowercase strings from VALID CATEGORIES.
    - confidence MUST be a float from the tier ranges above, with variance between predictions
    - Order triplets by confidence (highest first)
    - Return {"triplets": []} if no triplets are clearly visible
    - Wrap ONLY the JSON object in a single ```json fenced block, or return the bare JSON. No text outside the JSON.
    EXAMPLES (valid):
    - ```json
      {"triplets": []}
      ```
    - ```json
      {"triplets": [{"instrument":"grasper","verb":"grasp","target":"cystic_duct","confidence":0.95}]}
      ```
    - ```json
      {"triplets": [{"instrument":"grasper","verb":"grasp","target":"gallbladder","confidence":0.9}, {"instrument":"hook","verb":"dissect","target":"cystic_plate","confidence":0.7}]}
      ```
    EXAMPLES (invalid):
    - {"subject":"grasper","action":"grasp","object":"cystic_duct"}  # wrong keys
    - {"instrument":"grasper","verb":"grasp","target":"cystic_duct"}  # missing confidence
    - {"instrument":"grasper","verb":"grasp","target":"cystic_duct"}  # missing confidence
