# ============================================================================
# TRIPLETS BENCHMARK CONFIGURATION
# ============================================================================
# This config defines settings for surgical action triplet recognition evaluation
# GT triplets are loaded from CholecT50 annotations

# Methods to run
methods: ["single_frame", "multiframe", "graph_agent_single"]

# Where to dump per-clip prediction files during eval
output_dir: ${eval.output_dir}/triplets

# Tool visualization (null to disable, directory path to enable)
tool_viz_dir: ${eval.output_dir}/tool_viz/triplets

# Frame/annotation alignment parameters
FRAMERATE: 25  # Original video framerate
NUM_FRAMES: 80  # Frames per clip
frame_stride: 4  # Graph extraction stride (80 frames -> 20 timesteps)

# Graph agent parameters
graph_agent_max_iterations: 10
enable_highres_tools: false
max_inspect_node_calls: 20
max_list_neighbors_calls: 15
max_inspect_edge_calls: 10
max_inspect_node_highres_calls: 5
max_inspect_node_at_timestep_calls: 20
max_list_neighbors_at_timestep_calls: 15
max_inspect_edge_at_timestep_calls: 10

# ============================================================================
# SINGLE FRAME (image-only baseline)
# ============================================================================
single_frame_system_prompt: |
  # Task
  You are an expert visceral surgeon analyzing a cholecystectomy frame for surgical action triplets.
  
  # Rules
  - Identify ALL instrument-verb-target triplets that are CLEARLY VISIBLE and ACTIVE in this frame
  - Only report triplets where both instrument AND action are visible
  - Ensure instrument/verb/target combinations are surgically coherent
  - Reason briefly, then output final JSON

single_frame_prompt_template: |
  Identify all active surgical triplets (instrument-verb-target) visible in this frame.
  
  Valid categories:
  - instruments: grasper, bipolar, hook, scissors, clipper, irrigator
  - verbs: grasp, retract, dissect, coagulate, clip, cut, aspirate, irrigate, pack, null_verb
  - targets: gallbladder, cystic_plate, cystic_duct, cystic_artery, cystic_pedicle, blood_vessel, fluid, abdominal_wall_cavity, liver, adhesion, omentum, peritoneum, gut, specimen_bag, null_target
  
  Output format: {{"triplets": [{{"instrument": "<str>", "verb": "<str>", "target": "<str>", "confidence": <float>}}, ...]}}
  
  CRITICAL: Each triplet MUST have a different confidence value. Assess visibility independently.
  - Use values like [0.92, 0.75, 0.53] NOT [0.90, 0.90, 0.90]
  
  Wrap JSON in ```json fenced block.

