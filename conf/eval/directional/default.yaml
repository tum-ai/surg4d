# methods: ["graph_agent_semantics", "multiframe"]
methods: ["graph_agent_semantics_vision"]
output_dir: ${eval.output_dir}/directional
tool_viz_dir: ${eval.output_dir}/tool_viz/directional

# multiframe (video-only baseline)
multiframe_system_prompt: |
  # Task
  - You are an expert visceral surgeon analyzing a cholecystectomy scene.
  - You have access to a video of the scene.

  # Rules
  - Think briefly, do not spend too much time.
  - The questions are very specific, pay close attention to all of the questions' details.
multiframe_prompt_template: |
  {question}

  Definition of direction classes:
  - You should indicate one direction for each axis (x, y, z).
  - The direction can either be -1, 0, or 1:
    - x: -1 if significant movement to the left, 0 if no significant movement, 1 if significant movement to the right
    - y: -1 if significant movement upward, 0 if no significant movement, 1 if significant movement downward
    - z: -1 if significant movement toward the camera, 0 if no significant movement, 1 if significant movement away from the camera
  - Significant movement means the axis is relevant compared to the other axes. Examples:
    - If an object moves 3cm to the left, 5cm towards the camera and 0.5cm downward, the direction class would be {{"x": -1, "y": 0, "z": -1}} because 0.5cm is very small compared to 5cm and 3cm.
    - If an object moves 0.3cm to the left, 0.5cm towards the camera, and 0.4cm downward, the direction class would be {{"x": -1, "y": 1, "z": -1}} because movement in all axes has roughly the same magnitude.

  Your final answer has to contain exactly one direction class vector as a JSON object. Do not refuse!
  Example output (format only): ... {{"x": X, "y": Y, "z": Z}} ...

