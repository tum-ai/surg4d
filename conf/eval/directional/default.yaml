# graph agent with semantic labels and frame fetching tool
graph_agent_semantics_vision_max_iterations: 30
graph_agent_semantics_vision_tools:
  - name: node_distances_through_time
    max_calls: null
  - name: node_overlap_scores_through_time
    max_calls: null
  - name: node_overlap_position_at_time
    max_calls: null
  - name: node_movement_through_time
    max_calls: null
  - name: aggregated_node_movement
    max_calls: null
  - name: relative_node_movement_through_time
    max_calls: null
  - name: show_scene_at_timestep
    max_calls: null
graph_agent_semantics_vision_system_prompt: ${eval.generic_system_prompts.graph_agent_semantics_vision}
graph_agent_semantics_vision_prompt_template: |
  The following question only concerns timesteps {range_start} to {range_end} (inclusive). Do not consider any other timesteps for your answer!

  {question}

  Definition of direction classes:
  - You should indicate one direction for each axis (x, y, z).
  - The direction can either be -1, 0, or 1:
    - x: -1 if movement to the left, 0 if no movement, 1 if movement to the right
    - y: -1 if movement upward, 0 if no movement, 1 if movement downward
    - z: -1 if movement toward the camera, 0 if no movement, 1 if movement away from the camera

  Your final answer has to contain exactly one direction class vector as a JSON object. Do not refuse!
  Example output (format only): ... {{"x": X, "y": Y, "z": Z}} ...

