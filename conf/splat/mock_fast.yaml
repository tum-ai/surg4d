config_path: arguments/cholecseg8k/no_tv.py # this config disables total variation losses

depth_loss_weight: 2.0 
opacity_loss_weight: 1.0

dynamic_language: true
dynamic_scale: true
dynamic_color: true

coarse_base_iterations: 30 # static rgb splat
coarse_lang_iterations: 10 # static rgb + language splat
fine_base_iterations: 100 # dynamic rgb splat
fine_lang_iterations: 100 # dynamic rgb + language splat

# settings for simplifying coarse training for high quality initial depth map
densify_until_iter: 10000 # densify gaussians if smaller than this iteration, only applied in base stages, set to 0 to disable densification
coarse_freeze_xyz: false # if true, freezes gaussian xyz positions during coarse training stages
coarse_frame_idx: null # if set to an integer, overfit only on that frame index during coarse stages; null trains on all frames; only implemented for preloaded dataset (dataloader=False); if this is set the batch size is ignored and set to 1

progressive_window:
  enabled: false
  warmup_iterations: 80
  center_frame_idx: null

# each stage starts at 0 iterations and the lang stages consider these lists
# ATTENTION: it's crucial to save the last iteration of fine lang here!
test_iterations: [20, 100] # when to compute val metrics (logged to tensorboard)
save_iterations: [20, 100] # when to save model checkpoints to disk (for rendering, graph extraction, etc.)
checkpoint_iterations: [] # when to save full checkpoints (with optimizer states for resuming)

render_outputs:
  coarse_base: false
  coarse_lang: false
  fine_base: false
  fine_lang: true

# environment variables
language_feature_hiddendim: 6  # total dim = num_lang_features * lang_feature_dim
use_discrete_lang_f: f

# multiple independent language features (e.g., patch + instance)
num_lang_features: 2  # number of independent language feature types
lang_feature_dim: 3   # dimension of each feature (must match autoencoder latent_dim)

# model initialization
rezero_init: false  # Initialize deformation deltas to 0 using ReZero scaling

latent_cat_feat_subdir: ${autoencoder.latent_cat_feat_subdir}