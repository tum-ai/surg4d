config_path: arguments/cholecseg8k/no_tv.py # this config disables total variation losses

depth_loss_weight: 1.0
opacity_loss_weight: 0.0 # does not make sense without densification

# Optical flow loss: encourages Gaussian flow to match RAFT optical flow
flow_loss_weight: 0.0  # set > 0 to enable (e.g., 0.1), only active in fine stages
flow_thresh: 0.1  # threshold for large motion mask (filter out noise)

# CoTracker3 control point settings
cotracker_k_neighbors: 1  # number of nearest control points per Gaussian
cotracker_idw_power: 2.0  # power parameter for inverse distance weighting
# TODO: usage not implemented yet
cotracker_spawn_threshold_pct: 0.1  # spawn new Gaussians when pixels are >X% of image width/height from control points

dynamic_language: true
dynamic_scale: false
dynamic_color: false

# coarse iterations cut by 10x because we're only overfitting the feature heads on a single frame
coarse_base_iterations: 0
coarse_lang_iterations: 1
fine_base_iterations: 1000
fine_lang_iterations: 1000

# settings for simplifying coarse training for high quality initial depth map
# TODO: fix this later, only for debugging
densify_until_iter: 0
coarse_freeze_xyz: true # freeze gaussian means during coarse
coarse_frame_idx: null # train on all frames during coarse (point cloud initialized from first/middle/last frames)

# fine (dynamic) stage progressive frame sampling window
progressive_window:
  enabled: false
  warmup_iterations: 500 # lineraly expand window around specified center during warmup
  center_frame_idx: ${splat.coarse_frame_idx}

# each stage starts at 0 iterations and the lang stages consider these lists
# ATTENTION: it's crucial to save the last iteration of fine lang here!
test_iterations: [100, 10000] # when to compute val metrics (logged to tensorboard)
save_iterations: [100, 10000] # when to save model checkpoints to disk (for rendering, graph extraction, etc.)
checkpoint_iterations: [] # when to save full checkpoints (with optimizer states for resuming)

render_outputs:
  coarse_base: false
  coarse_lang: false
  fine_base: false
  fine_lang: true

# environment variables
language_feature_hiddendim: 6
use_discrete_lang_f: f

# model initialization
rezero_init: true  # Initialize deformation deltas to 0 using ReZero scaling

latent_cat_feat_subdir: ${autoencoder.latent_cat_feat_subdir}