config_path: arguments/cholecseg8k/no_tv.py # this config disables total variation losses
# config_path: arguments/cholecseg8k/default.py

loss_weights:
  rgb_l1: 1.0 # base stages: mean absolute error between rendered RGB and GT RGB
  depth_l1: 1.0 # base stages: mean absolute error between rendered depth map and GT depth map
  lang_cosine: 0.01 # lang stages: CosineEmbeddingLoss between predicted and GT language features (masked valid pixels only)
  joint_rgb_l1: 1.0 # lang stages with joint_train: extra RGB L1 term added alongside language loss
  ssim: 0.0 # all stages: adds ssim_weight * (1 - SSIM(render, gt)) as a perceptual image-structure term
  fine_regulation: 1.0 # fine stages: global multiplier on deformation-grid regularization (time_smoothness + l1_time_planes + plane_tv)
  time_smoothness: 0.0 # fine stages: weight on second-derivative smoothness of temporal/spatiotemporal deformation planes
  l1_time_planes: 0.0 # fine stages: weight on mean |1 - grid| for temporal/spatiotemporal planes (encourages static/identity deformation)
  plane_tv: 0.0 # fine stages: weight on spatial total-variation regularization of deformation planes

learning_rates:
  lr_max_steps: 5000 # xyz/deformation/grid LR schedule horizon in optimizer steps
  position_init: 0.00016 # xyz Adam LR at start (scheduled)
  position_final: 0.0000016 # xyz Adam LR at end of schedule
  position_delay_mult: 0.01 # xyz LR schedule warmup multiplier
  deformation_init: 0.00016 # deformation MLP LR at start (scheduled), also used by lang deformation heads
  deformation_final: 0.000016 # deformation MLP LR at end of schedule, also used by lang deformation heads
  deformation_delay_mult: 0.01 # deformation/grid LR schedule warmup multiplier, also used by lang deformation heads
  grid_init: 0.0016 # deformation grid LR at start (scheduled)
  grid_final: 0.00016 # deformation grid LR at end of schedule
  feature: 0.0025 # SH feature LR for f_dc (f_rest uses feature/20 internally)
  opacity: 0.05 # opacity LR
  language_feature: 0.0025 # language feature LR
  scaling: 0.005 # scale LR
  rotation: 0.001 # rotation LR

tensorboard_subdir: "correct_lr_schedule" # TensorBoard subdir prefix; actual folder is "<prefix>_<timestamp>"

# CoTracker3 control point settings
cotracker_k_neighbors: 3 # number of nearest control points per Gaussian
cotracker_idw_power: 2.0  # power parameter for inverse distance weighting
# TODO: usage not implemented yet
cotracker_spawn_threshold_pct: 0.1  # spawn new Gaussians when pixels are >X% of image width/height from control points

dynamic_language: true
dynamic_scale: true
dynamic_color: true

# coarse iterations cut by 10x because we're only overfitting the feature heads on a single frame
coarse_base_iterations: 500
coarse_lang_iterations: 500
fine_base_iterations: 5000 # ! tmp while experimenting
fine_lang_iterations: 5000

# settings for simplifying coarse training for high quality initial depth map
# TODO: fix this later, only for debugging
densify_until_iter: 0
coarse_freeze_xyz: true # freeze gaussian means during coarse
coarse_frame_idx: null # train on all frames during coarse (point cloud initialized from first/middle/last frames)

# fine (dynamic) stage progressive frame sampling window
progressive_window:
  enabled: false
  warmup_iterations: 500 # lineraly expand window around specified center during warmup
  center_frame_idx: ${splat.coarse_frame_idx}

# each stage starts at 0 iterations and the lang stages consider these lists
# ATTENTION: it's crucial to save the last iteration of fine lang here!
test_iterations: [499, 999, 1499, 1999, 2999, 4999, 8999, 9999] # when to compute val metrics (logged to tensorboard)
save_iterations: [5000] # when to save model checkpoints to disk (for rendering, graph extraction, etc.)
checkpoint_iterations: [] # when to save full checkpoints (with optimizer states for resuming)

save_best_checkpoint: true
best_checkpoint_warmup_iterations: 500

render_outputs:
  coarse_base: false
  coarse_lang: false
  fine_base: false
  fine_lang: true

# environment variables
language_feature_hiddendim: 32 # total dim = num_lang_features * lang_feature_dim
use_discrete_lang_f: t
centers_num: 10  # number of discrete deformation states to interpolate between

# multiple independent language features (e.g., patch + instance)
num_lang_features: 2  # number of independent language feature types
lang_feature_dim: 16   # dimension of each feature (must match autoencoder latent_dim)
lang_deform_width: 256  # hidden width of language deformation heads (independent from backbone net_width)
lang_timebase_pe: 4    # frequency bands for language time PE (higher = more temporal bandwidth than main timebase_pe=4)

# model initialization
rezero_init: false  # Initialize deformation deltas to 0 using ReZero scaling

latent_cat_feat_subdir: ${autoencoder.latent_cat_feat_subdir}