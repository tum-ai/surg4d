gt_filename: ${preprocessing.spatial_labels_output_filename}
pred_root: ${eval.output_dir}/spatial
output_dir: ${compute_metrics.output_dir}/spatial
aggregated_output_filename: ${compute_metrics.spatial.output_dir}/aggregated.json
output_filename: ${compute_metrics.output_dir}/spatial_metrics.json

l2_top_ks: [1, 3, 5, 10, 25, 50]
layers: [0, 1, 2, 12, 16, 20, 24, 28, 31] # 0 is mock layer of graph prompting

