graph_output_subdir: graph_spectral

# gaussian model params
language_feature_hiddendim: ${splat.language_feature_hiddendim}
use_discrete_lang_f: ${splat.use_discrete_lang_f}
config_path: ${splat.config_path}
dynamic_language: ${splat.dynamic_language}
latent_cat_feat_subdir: ${splat.latent_cat_feat_subdir}
load_stage: fine-lang
iteration: -1

# ae params
checkpoint_subdir: ${autoencoder.checkpoint_subdir}
full_dim: ${autoencoder.full_dim}
latent_dim: ${autoencoder.latent_dim}
use_global_autoencoder: ${autoencoder.global_mode}
global_autoencoder_checkpoint_dir: ${autoencoder.global_checkpoint_dir}

# gaussian filtering before clustering
# relevance is defined as opacity * ||language_feature||_2 in latent space
relevance_threshold: 0.0

# clustering
cluster_method: spectral # one of: [spectral, hdbscan]

# hdbscan clustering
# "custom metric" does cos dist on lang part and l2 on pos part
# "vanilla metric" concats both and does whatever metric is set
custom_cluster_metric: false # ! does not run on camp due to too little RAM
clustering_weights:
  position: 1.0
  instance: 2.0
custom_metric_hdbscan_args:
  metric: precomputed
  min_cluster_size: 150
  min_samples: 150
  cluster_selection_method: leaf # "eom" is default
vanilla_metric_hdbscan_args:
  metric: euclidean
  min_cluster_size: 150
  min_samples: 150
  cluster_selection_method: leaf # "eom" is default

# spectral clustering
spectral_clustering:
  knn_graph_k: 5
  spectral_embedding_dim: 5
  hdbscan_args:
    metric: euclidean
    min_cluster_size: 200
    min_samples: 200

# cluster filtering after clustering
min_gaussians_per_cluster: 150

# how many vision features represent each cluster
max_features_per_cluster: 40
min_features_per_cluster: 4

# lf decoding
decode_batch_size: 1024

# graph
n_timesteps: 20
graph_edge_threshold: 0.05 # edge if bhattacharyya coefficient >= threshold

# outputs
store_verbose: true  # save verbose outputs (renders, palettes, raw gaussians, etc.)
n_render_views: 1  # number of random camera views to render (only if store_verbose is true)

random_seed: 1234

# spatial grounding feature extraction
spatial_grounding:
  n_splat_points: 1000
  n_cluster_points: 100

# Mask-based cluster filtering of clusters by comparing rendered cluster masks
# against precomputed instance masks in the preprocessed clip directory.
mask_filtering:
  enabled: false           # disabled by default; enable to filter clusters by masks
  metric: coverage         # one of: [coverage, iou]
  threshold: 0.8           # minimum required score for the chosen metric
  mask_subdir: instance_masks  # relative to {preprocessed_root}/{clip.name}
  min_component_area: 50   # ignore tiny connected components in instance masks
