graph_output_subdir: graph

# gaussian model params
language_feature_hiddendim: ${splat.language_feature_hiddendim}
use_discrete_lang_f: ${splat.use_discrete_lang_f}
config_path: ${splat.config_path}
dynamic_language: ${splat.dynamic_language}
latent_cat_feat_subdir: ${splat.latent_cat_feat_subdir}
num_lang_features: ${splat.num_lang_features}
lang_feature_dim: ${splat.lang_feature_dim}
load_stage: fine-lang
iteration: -1
# iteration: 1000

# ae params
checkpoint_subdir: ${autoencoder.checkpoint_subdir}
full_dim: ${autoencoder.full_dim}
latent_dim: ${autoencoder.latent_dim}
use_global_autoencoder: ${autoencoder.global_mode}
global_autoencoder_checkpoint_dir: ${autoencoder.global_checkpoint_dir}

# gaussian filtering before clustering
precluster_opacity_threshold: 0.05

# clustering
cluster_method: spectral # one of: [spectral, precomputed, hdbscan, full_hdbscan]

full_hdbscan_clustering:
  soft_clustering: true
  hdbscan_args:
    min_cluster_size: 150
    min_samples: 150
  timesteps: 3
  weight_pos: 1.0
  weight_lf: 1.0

# spectral clustering
spectral_clustering:
  knn_graph_k: 20
  spectral_embedding_dim: 5
  soft_clustering: true
  hdbscan_args:
    min_cluster_size: 300
    min_samples: 300
  pos_timesteps: 10
  weight_pos: 1.0
  weight_lf: 5.0
  rbf_sigma_pos_factor: 1.0
  rbf_sigma_lf_factor: 1.0

hdbscan_clustering:
  knn_graph_k: 10
  soft_clustering: true
  hdbscan_args:
    min_cluster_size: 300
    min_samples: 10
  pos_timesteps: 10
  weight_pos: 1.0
  weight_lf: 5.0
  rbf_sigma_pos_factor: 1.0
  rbf_sigma_lf_factor: 0.5

# how many vision features represent each cluster
feature_selection: opacity # one of: [opacity, random]
features_per_cluster: 64

# lf decoding
decode_batch_size: 16384

# graph
n_timesteps: 20
graph_edge_threshold: 0.05 # edge if bhattacharyya coefficient >= threshold

# outputs
store_verbose: true  # save verbose outputs (renders, palettes, raw gaussians, etc.)

random_seed: 1234